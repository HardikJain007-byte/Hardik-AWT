<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #45a049;
        }

        p {
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Register</h2>

        <input id="regUser" placeholder="Enter Username">
        <input id="regPass" type="password" placeholder="Enter Password">

        <button id="registerBtn">Register</button>

        <p id="regMsg"></p>

        <a href="login.html">Already have an account? Login</a>
    </div>

<script>
    $("#registerBtn").click(function () {
        let u = $("#regUser").val();
        let p = $("#regPass").val();

        if (u === "" || p === "") {
            $("#regMsg").text("Please fill all fields!");
            return;
        }

        localStorage.setItem("username", u);
        localStorage.setItem("password", p);

        $("#regMsg").text("Registration Successful!");
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1500);
    });
</script>

</body>
</html>
