<!DOCTYPE html>
<html>
<head>
    <title>Pure Potato | 100% Real Homemade Chips</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🥔 Pure Potato</h1>
    <p>100% Real Potato | Homemade | With or Without Salt</p>
</header>

<section class="products">

    <div class="card">
        <h2>Raw Chips 1kg</h2>
        <p>₹180</p>
        <button onclick="addToCart('Raw Chips 1kg',180)">Add to Cart</button>
    </div>

    <div class="card">
        <h2>Raw Chips 500g</h2>
        <p>₹100</p>
        <button onclick="addToCart('Raw Chips 500g',100)">Add to Cart</button>
    </div>

    <div class="card">
        <h2>Homemade Papad</h2>
        <p>₹150</p>
        <button onclick="addToCart('Papad',150)">Add to Cart</button>
    </div>

</section>

<section class="cart">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button onclick="placeOrder()">Order on WhatsApp</button>
</section>

<script src="script.js"></script>
</body>
</html>
